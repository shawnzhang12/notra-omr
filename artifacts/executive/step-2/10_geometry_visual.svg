<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .mono { font: 500 16px 'Consolas', 'Menlo', monospace; fill: #0f172a; }
      .hint { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="url(#bg)"/>

  <text x="60" y="76" class="title">Step 2 Geometry Contract</text>
  <text x="60" y="110" class="subtitle">`BBox`, `Point`, and deterministic overlap math for provenance and debug overlays</text>

  <g transform="translate(70,170)">
    <rect x="0" y="0" width="1240" height="620" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

    <g opacity="0.45" stroke="#cbd5e1" stroke-width="2">
      <line x1="120" y1="120" x2="1120" y2="120"/>
      <line x1="120" y1="180" x2="1120" y2="180"/>
      <line x1="120" y1="240" x2="1120" y2="240"/>
      <line x1="120" y1="300" x2="1120" y2="300"/>
      <line x1="120" y1="360" x2="1120" y2="360"/>
    </g>

    <rect x="250" y="150" width="400" height="260" fill="#22d3ee" fill-opacity="0.22" stroke="#0891b2" stroke-width="4"/>
    <rect x="470" y="220" width="420" height="280" fill="#f59e0b" fill-opacity="0.22" stroke="#d97706" stroke-width="4"/>
    <rect x="470" y="220" width="180" height="190" fill="#10b981" fill-opacity="0.30" stroke="#059669" stroke-width="3" stroke-dasharray="9 6"/>

    <circle cx="450" cy="280" r="7" fill="#0f172a"/>
    <text x="465" y="286" class="label">center(A)</text>

    <text x="250" y="140" class="label">A: BBox(250,150,650,410)</text>
    <text x="470" y="210" class="label">B: BBox(470,220,890,500)</text>
    <text x="470" y="432" class="label">intersection(A,B)</text>

    <text x="820" y="120" class="mono">A.area = 104000</text>
    <text x="820" y="150" class="mono">B.area = 117600</text>
    <text x="820" y="180" class="mono">overlap = 34200</text>
    <text x="820" y="210" class="mono">IoU = 0.182</text>

    <text x="120" y="540" class="hint">Impact: this exact geometry model is reused for provenance bboxes, overlays, and detector evaluation metrics.</text>
  </g>
</svg>
