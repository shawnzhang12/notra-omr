<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .label { font: 600 19px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .mono { font: 600 18px 'Consolas', 'Menlo', monospace; fill: #1f2937; }
      .hint { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="860" fill="url(#bg)"/>

  <text x="60" y="76" class="title">Step 2 Stable ID Strategy</text>
  <text x="60" y="110" class="subtitle">Deterministic prefixes + per-prefix counters for diffability and issue trace links</text>

  <g transform="translate(80,180)">
    <rect x="0" y="0" width="1220" height="600" rx="20" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>

    <rect x="70" y="100" width="260" height="140" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="95" y="150" class="label">IdSequence(seed)</text>
    <text x="95" y="185" class="mono">{ event: 3 }</text>

    <rect x="470" y="60" width="300" height="120" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="500" y="110" class="mono">next("event")</text>
    <text x="500" y="145" class="mono">event-003</text>

    <rect x="470" y="220" width="300" height="120" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="500" y="270" class="mono">next("event")</text>
    <text x="500" y="305" class="mono">event-004</text>

    <rect x="470" y="380" width="300" height="120" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="500" y="430" class="mono">next("measure")</text>
    <text x="500" y="465" class="mono">measure-000</text>

    <line x1="330" y1="170" x2="460" y2="120" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="330" y1="170" x2="460" y2="280" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="330" y1="170" x2="460" y2="440" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="860" y="140" width="300" height="280" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="895" y="190" class="label">Validation Linkage</text>
    <text x="895" y="230" class="mono">node_id: measure-007</text>
    <text x="895" y="265" class="mono">related: event-031</text>
    <text x="895" y="300" class="mono">related: event-032</text>
    <text x="895" y="350" class="hint">Diffs and UI references stay stable</text>

    <line x1="770" y1="280" x2="850" y2="280" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="80" y="560" class="hint">Impact: IDs become durable references across exporter logs, validator errors, and viewer click targets.</text>
  </g>
</svg>
